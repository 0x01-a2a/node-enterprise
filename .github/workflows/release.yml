name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create GitHub Release with assets

jobs:
  # ── Build zerox1-node-enterprise binary for each target platform ───────────
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: zerox1-node-enterprise

          - os: macos-latest # arm64 runner (M-series)
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary: zerox1-node-enterprise

          - os: macos-latest # cross-compile x64 from arm64 runner
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary: zerox1-node-enterprise

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary: zerox1-node-enterprise.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Build zerox1-node-enterprise
        run: cargo build --release -p zerox1-node-enterprise --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerox1-node-enterprise-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  # ── Build zerox1-aggregator (Linux only — server-side service) ───────────
  build-server-services:
    name: Build server services
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-

      - name: Build aggregator
        run: cargo build --release -p zerox1-aggregator
        env:
          CARGO_TERM_COLOR: always

      - name: Upload aggregator artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerox1-aggregator
          path: target/release/zerox1-aggregator
          if-no-files-found: error

  # ── Assemble and publish npm packages ────────────────────────────────────
  publish-npm:
    name: Publish npm packages
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Build SDK TypeScript
        working-directory: sdk
        run: npm run build

      - name: Copy binaries into platform packages
        run: |
          mkdir -p sdk/packages/darwin-arm64/bin
          mkdir -p sdk/packages/darwin-x64/bin
          mkdir -p sdk/packages/linux-x64/bin
          mkdir -p sdk/packages/win32-x64/bin

          cp artifacts/zerox1-node-enterprise-darwin-arm64/zerox1-node-enterprise      sdk/packages/darwin-arm64/bin/
          cp artifacts/zerox1-node-enterprise-darwin-x64/zerox1-node-enterprise        sdk/packages/darwin-x64/bin/
          cp artifacts/zerox1-node-enterprise-linux-x64/zerox1-node-enterprise         sdk/packages/linux-x64/bin/
          cp artifacts/zerox1-node-enterprise-win32-x64/zerox1-node-enterprise.exe     sdk/packages/win32-x64/bin/

          chmod +x sdk/packages/darwin-arm64/bin/zerox1-node-enterprise
          chmod +x sdk/packages/darwin-x64/bin/zerox1-node-enterprise
          chmod +x sdk/packages/linux-x64/bin/zerox1-node-enterprise

      - name: Set package versions from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          cd sdk
          # Update main package
          npm version "$TAG" --no-git-tag-version --allow-same-version
          # Update platform packages and sync optionalDependencies version
          for pkg in packages/*/; do
            (cd "$pkg" && npm version "$TAG" --no-git-tag-version --allow-same-version)
          done
          # Patch optionalDependencies in main package.json to match
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[k] = '$TAG';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages (darwin-arm64)
        working-directory: sdk/packages/darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages (darwin-x64)
        working-directory: sdk/packages/darwin-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages (linux-x64)
        working-directory: sdk/packages/linux-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages (win32-x64)
        working-directory: sdk/packages/win32-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main @zerox1/sdk package
        working-directory: sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release with binary attachments ─────────────────────────
  github-release:
    name: GitHub Release
    needs: [build, build-server-services]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          cp artifacts/zerox1-node-enterprise-darwin-arm64/zerox1-node-enterprise            zerox1-node-enterprise-darwin-arm64
          cp artifacts/zerox1-node-enterprise-darwin-x64/zerox1-node-enterprise              zerox1-node-enterprise-darwin-x64
          cp artifacts/zerox1-node-enterprise-linux-x64/zerox1-node-enterprise               zerox1-node-enterprise-linux-x64
          cp artifacts/zerox1-node-enterprise-win32-x64/zerox1-node-enterprise.exe           zerox1-node-enterprise-win32-x64.exe
          cp artifacts/zerox1-aggregator/zerox1-aggregator                                   zerox1-aggregator-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zerox1-node-enterprise-darwin-arm64
            zerox1-node-enterprise-darwin-x64
            zerox1-node-enterprise-linux-x64
            zerox1-node-enterprise-win32-x64.exe
            zerox1-aggregator-linux-x64
          generate_release_notes: true
